name: Daily Auto-Run Pipeline

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Skip deploy (false = deploy)'
        required: false
        default: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Generate blog posts
        run: |
          node engine/generate-trending-posts.js
          node engine/generate-geo-posts.js

      - name: Generate products
        run: node engine/trending-products.js

      - name: Anglicize pages (remove Chinese text)
        run: node engine/anglicize-pages.js

      - name: Generate multi-language pages
        run: node engine/generate-multi.js

      - name: Add GEO schemas (Product, FAQPage, BreadcrumbList, HowTo)
        run: |
          node engine/add-faq-and-schema.js
          node engine/add-product-schema.js
          node engine/add-geo-schemas.js

      - name: Fix purchase flow
        run: node engine/fix-purchase-flow.js

      - name: Run GEO optimization (llms.txt, robots.txt, Organization+FAQ schema, IndexNow key)
        run: node engine/geo-optimize.js

      - name: Generate knowledge base FAQ page
        run: node engine/generate-knowledge-base.js

      - name: Regenerate sitemap
        run: node generate-sitemap.js

      - name: Generate multi-site content (6 sub-sites, v5/v6/v7/v8 tools, dynamic index)
        run: node engine/generate-multi-site.js

      - name: Generate v2 blog posts (78 long-tail keyword posts)
        run: node engine/generate-blog-posts-v2.js

      - name: SEO optimizer (inject keywords, meta tags, alt text)
        run: node engine/seo-optimizer.js

      - name: Add monetization (affiliate links, ad slots)
        run: node engine/add-monetization.js

      - name: Bundle premium products into downloadable zips
        run: node engine/bundle-products.js

      - name: Generate download landing pages
        run: node generate-downloads.js

      - name: Generate content distribution articles (dev.to, Medium)
        run: node engine/content-distributor.js

      - name: Deploy automoney-store (main store)
        if: ${{ inputs.deploy != 'false' || github.event_name != 'workflow_dispatch' }}
        run: wrangler pages deploy output --branch main --project-name automoney-store --commit-dirty=true 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy maomaolove (main brand)
        if: ${{ inputs.deploy != 'false' || github.event_name != 'workflow_dispatch' }}
        run: wrangler pages deploy sites/maomaolove --branch main --project-name maomaolove --commit-dirty=true 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy aitools
        if: ${{ inputs.deploy != 'false' || github.event_name != 'workflow_dispatch' }}
        run: wrangler pages deploy sites/aitools --branch main --project-name aitools --commit-dirty=true 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy templatehub
        if: ${{ inputs.deploy != 'false' || github.event_name != 'workflow_dispatch' }}
        run: wrangler pages deploy sites/templatehub --branch main --project-name templatehub --commit-dirty=true 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy geoseo
        if: ${{ inputs.deploy != 'false' || github.event_name != 'workflow_dispatch' }}
        run: wrangler pages deploy sites/geoseo --branch main --project-name geoseo --commit-dirty=true 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy cryptopay
        if: ${{ inputs.deploy != 'false' || github.event_name != 'workflow_dispatch' }}
        run: wrangler pages deploy sites/cryptopay --branch main --project-name cryptopay --commit-dirty=true 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy agentpro
        if: ${{ inputs.deploy != 'false' || github.event_name != 'workflow_dispatch' }}
        run: |
          cp output/_worker.js sites/agentpro/_worker.js
          wrangler pages deploy sites/agentpro --branch main --project-name agentpro --commit-dirty=true 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy sidehustle
        if: ${{ inputs.deploy != 'false' || github.event_name != 'workflow_dispatch' }}
        run: wrangler pages deploy sites/sidehustle --branch main --project-name sidehustle --commit-dirty=true 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Submit IndexNow for all sites
        run: node engine/indexnow-resubmit-all.js

      - name: Submit to Brave Search (top 100 URLs)
        run: node engine/submit-all.js

      - name: Submit to 10 tool directories
        run: node engine/submit-directories.js


